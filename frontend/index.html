<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Delta-Routine</title>
  <script>if(location.protocol==='http:')location.href=location.href.replace('http://s33ding-delta-routine.s3-website-us-east-1.amazonaws.com','https://s33ding-delta-routine.s3.amazonaws.com');</script>
  <link rel="stylesheet" href="css/style.css?v=6">
</head>
<body>
  <div id="login-slot"></div>

  <div id="app-section" style="display:none;flex-direction:column;height:100vh">
    <div id="header-slot"></div>
    <div class="toolbar">
      <button class="toggle-btn active" onclick="togglePanel('schedule')">Schedule</button>
      <button class="toggle-btn active" onclick="togglePanel('chat')">Chat</button>
      <button class="toggle-btn active" onclick="togglePanel('insights')">Insights</button>
      <button class="toggle-btn active" onclick="togglePanel('todo')">To-Do</button>
    </div>
    <div class="main">
      <div id="schedule-slot" class="panel panel-left"></div>
      <div id="chat-slot" class="panel panel-right"></div>
    </div>
  </div>

  <script>
    async function loadPartials() {
      const slots = {
        'login-slot': 'html/login.html',
        'header-slot': 'html/header.html',
        'schedule-slot': 'html/schedule.html',
        'chat-slot': 'html/chat.html'
      };
      await Promise.all(Object.entries(slots).map(async ([id, url]) => {
        try {
          const r = await fetch(url);
          if (r.ok) document.getElementById(id).innerHTML = await r.text();
        } catch(e) {}
      }));
      try {
        const r = await fetch('html/insights.html');
        if (r.ok) document.getElementById('insights-partial').innerHTML = await r.text();
      } catch(e) {}
      const s = document.createElement('script');
      s.src = 'js/app.js?v=6';
      document.body.appendChild(s);
    }

    function togglePanel(name) {
      const map = {
        schedule: { el: 'schedule-slot', sub: '.panel-body' },
        chat: { el: 'chat-slot', sub: '#messages,#input-area,#loading' },
        insights: { el: null, sub: '#insights-partial' },
        todo: { el: null, sub: '#todo-list' }
      };
      const btn = event.target;
      btn.classList.toggle('active');
      const hidden = !btn.classList.contains('active');
      if (map[name].el) {
        document.getElementById(map[name].el).style.display = hidden ? 'none' : 'flex';
      }
      if (map[name].sub) {
        document.querySelectorAll(map[name].sub).forEach(el => el.style.display = hidden ? 'none' : '');
      }
    }

    loadPartials();
  </script>
</body>
</html>
